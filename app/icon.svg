  <!-- canopy -->
  <rect x="8" y="3" width="16" height="14" fill="#3a7d44" />
  <rect x="6" y="5" width="20" height="10" fill="#3a7d44" />
  <!-- leaf highlights -->
  <rect x="8" y="5" width="4" height="4" fill="#7bd88f" />
  <rect x="12" y="9" width="4" height="2" fill="#7bd88f" />
  <!-- apple -->
